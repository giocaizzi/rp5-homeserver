# OpenTelemetry Collector (Alloy) - OTLP HTTP endpoint
#
# Two hostnames share the upstream:
#   - otel.home              LAN ingress, bearer-auth enforced by Alloy
#   - otel.giocaizzi.xyz     public ingress via CF tunnel; CF Access bypass
#                            (path-scoped to /v1/*) is outer gate, Alloy
#                            bearer-auth is inner gate
#
# Authorization header is forwarded to the upstream by nginx default behavior.
server {
    listen 443 ssl;
    # OTEL HTTP supports only HTTP/1.1
    server_name otel.home otel.giocaizzi.xyz;

    include snippets/ssl-params.conf;
    include snippets/error-503.conf;

    location / {
        # No rate limiting for telemetry data - high throughput expected
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;

        # Increase body size for batched telemetry
        client_max_body_size 10m;

        # Timeouts for telemetry ingestion
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering for real-time ingestion
        proxy_buffering off;
    }
}
