# Code - Remote Claude Code dev environment (CloudCLI UI + web terminal)
server {
    listen 443 ssl;
    http2 on;
    server_name code.home code.giocaizzi.xyz;

    include snippets/ssl-params.conf;
    include snippets/error-503.conf;

    location / {
        limit_req zone=general burst=50 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
        include snippets/websocket-support.conf;
        include snippets/timeouts-streaming.conf;

        # Disable buffering for interactive terminal / streaming output
        proxy_buffering off;
    }
}
