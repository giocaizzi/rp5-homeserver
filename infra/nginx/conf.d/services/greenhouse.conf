# Greenhouse - Smart plant irrigation (HTMX UI + JSON API)
# LAN: plain HTTP on greenhouse.home because the self-signed *.giocaizzi.xyz
# cert does not match greenhouse.home, breaking strict TLS clients (e.g.
# Claude MCP). Bearer-token auth on /mcp still gates physical actuation.
# Public: TLS on greenhouse.giocaizzi.xyz, gated by Cloudflare Access.
server {
    listen 80;
    server_name greenhouse.home;

    include snippets/error-503.conf;

    # MCP endpoint — upstream gates on Authorization: Bearer GREENHOUSE_MCP_TOKEN
    # (fail-closed since v2.0.0). Tight rate limit since this is the physical
    # actuation surface; auth itself is enforced by the app.
    location /mcp {
        limit_req zone=general burst=5 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
        include snippets/static-assets.conf;
    }

    # JSON API (no UI rendering, lower rate ceiling)
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
    }

    # HTMX web UI — supports server-sent fragment polling and chart streams
    location / {
        limit_req zone=general burst=30 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
        include snippets/websocket-support.conf;

        # HTMX polling fragments — keep responses unbuffered so status updates
        # surface immediately during irrigation cycles.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}

# Public hostname (Cloudflare tunnel → infra-proxy:443). CF Access is the outer
# gate; the LAN port-80 block above stays untouched so Claude MCP can keep
# hitting greenhouse.home/mcp without TLS hostname mismatch.
server {
    listen 443 ssl;
    http2 on;
    server_name greenhouse.giocaizzi.xyz;

    include snippets/ssl-params.conf;
    include snippets/error-503.conf;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
        include snippets/static-assets.conf;
    }

    location /api/ {
        limit_req zone=general burst=20 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        set $upstream $backend;
        proxy_pass http://$upstream;
        include snippets/proxy-headers.conf;
        include snippets/websocket-support.conf;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
    }
}
