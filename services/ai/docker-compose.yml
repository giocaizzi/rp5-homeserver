# =============================================================================
# YAML Anchors - Common configurations
# =============================================================================
x-labels-base: &labels-base
  com.giocaizzi.namespace: "ai"
  com.giocaizzi.env: "production"

x-deploy-base: &deploy-base
  mode: replicated
  replicas: 1
  placement:
    constraints:
      - node.role == manager
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-logging-base: &logging-base
  driver: "json-file"
  options:
    max-size: "50m"  # Larger for AI operations
    max-file: "3"

x-security-base: &security-base
  security_opt:
    - no-new-privileges:true

# =============================================================================
# Networks
# =============================================================================
networks:
  # Private network for ai stack
  ai_network:
    driver: overlay
    name: rp5_ai

  # External network to connect to nginx proxy
  public_network:
    external: true
    name: rp5_public

# =============================================================================
# Services
# =============================================================================
services:
  llm:
    image: ollama/ollama:latest
    hostname: ai-llm
    expose:
      - "11434"
    environment:
      # Server configuration
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama
      - OLLAMA_DEBUG=false
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      # Raspberry Pi optimizations
      - OLLAMA_MAX_VRAM=1024
      - OLLAMA_FLASH_ATTENTION=false
    volumes:
      - ollama_data:/root/.ollama   # persists models, configs
    networks:
      - ai_network
      - public_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Allow more time for model loading
    labels:
      <<: *labels-base
      com.giocaizzi.service: "llm"
      com.giocaizzi.component: "app"
      com.giocaizzi.tier: "core"
      com.giocaizzi.technology: "ollama"
    <<: *security-base
    deploy:
      <<: *deploy-base
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    tmpfs:
      - /tmp:size=1G,noexec,nosuid,nodev
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
    logging:
      <<: *logging-base

  chat:
    image: ghcr.io/open-webui/open-webui:v0.8.5
    hostname: ai-chat
    expose:
      - "8080"
    environment:
      - OLLAMA_BASE_URL=http://llm:11434
    volumes:
      - openwebui_data:/app/backend/data
    secrets:
      - webui_secret_key
    entrypoint:
      - /bin/sh
      - -c
      - export WEBUI_SECRET_KEY=$$(cat /run/secrets/webui_secret_key); exec bash start.sh
    networks:
      - ai_network
      - public_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # OpenWebUI loads ML models on startup
    labels:
      <<: *labels-base
      com.giocaizzi.service: "chat"
      com.giocaizzi.component: "app"
      com.giocaizzi.tier: "core"
      com.giocaizzi.technology: "open-webui"
    <<: *security-base
    deploy:
      <<: *deploy-base
      resources:
        limits:
          memory: 1G
    logging:
      <<: *logging-base

volumes:
  ollama_data:
    driver: local
  openwebui_data:
    driver: local

secrets:
  webui_secret_key:
    external: true