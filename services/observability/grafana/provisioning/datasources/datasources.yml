apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://observability-metrics-store:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://observability-log-store:3100
    editable: true
    jsonData:
      maxLines: 1000
      # Enable derived fields for trace correlation
      derivedFields:
        - name: TraceID
          matcherRegex: '(?:traceID|trace_id|trace-id)["\\\s:=]*([a-f0-9]{16,32})'
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://observability-trace-store:3200
    editable: true
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: 'loki'
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        tags:
          - { key: 'service.name', value: 'service_name' }
          - { key: 'service.namespace', value: 'service_namespace' }
        filterByTraceID: true
        filterBySpanID: true
        customQuery: true
        query: '{service_name="$${__span.tags["service.name"]}"} | traceID="$${__span.traceId}"'
      tracesToMetrics:
        datasourceUid: 'prometheus'
        tags:
          - { key: 'service.name', value: 'service_name' }
        queries:
          - name: 'Request rate'
            query: 'sum(rate(http_server_request_duration_seconds_count{$$__tags}[5m]))'
      serviceMap:
        datasourceUid: 'prometheus'
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: 'loki'
