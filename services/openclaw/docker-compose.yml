# =============================================================================
# YAML Anchors - Common configurations
# =============================================================================
x-labels-base: &labels-base
  com.giocaizzi.namespace: "openclaw"
  com.giocaizzi.env: "production"

x-deploy-base: &deploy-base
  mode: replicated
  replicas: 1
  placement:
    constraints:
      - node.role == manager
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-logging-base: &logging-base
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-security-base: &security-base
  security_opt:
    - no-new-privileges:true

# =============================================================================
# Networks
# =============================================================================
networks:
  openclaw_network:
    driver: overlay
    name: rp5_openclaw

  public_network:
    external: true
    name: rp5_public

# =============================================================================
# Volumes
# =============================================================================
volumes:
  config_data:
  workspace_data:

# =============================================================================
# Auth model
# =============================================================================
# OpenClaw gateway + provider credentials are managed via OpenClaw CLI onboarding
# and auth-profile commands inside the persistent config volume.

# =============================================================================
# Services
# =============================================================================
services:
  gateway:
    image: ghcr.io/giocaizzi/openclaw-gateway:latest
    hostname: openclaw-gateway
    expose:
      - "18789"
      - "18790"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      # add persistent bin folder to PATH for Openclaw own CLI tools
      - PATH=/home/node/.openclaw/bin:${PATH} 
    command:
      - node
      - /app/dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
      - --allow-unconfigured
    volumes:
      - config_data:/home/node/.openclaw
      - workspace_data:/home/node/.openclaw/workspace
    networks:
      - openclaw_network
      - public_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      <<: *labels-base
      com.giocaizzi.service: "gateway"
      com.giocaizzi.component: "app"
      com.giocaizzi.tier: "core"
      com.giocaizzi.technology: "openclaw"
    <<: *security-base
    deploy:
      <<: *deploy-base
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      <<: *logging-base
