# =============================================================================
# YAML Anchors - Common configurations
# =============================================================================
x-labels-base: &labels-base
  com.giocaizzi.namespace: "openclaw"
  com.giocaizzi.env: "production"

x-deploy-base: &deploy-base
  mode: replicated
  replicas: 1
  placement:
    constraints:
      - node.role == manager
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-logging-base: &logging-base
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-security-base: &security-base
  security_opt:
    - no-new-privileges:true

# =============================================================================
# Networks
# =============================================================================
networks:
  openclaw_network:
    driver: overlay
    name: rp5_openclaw

  public_network:
    external: true
    name: rp5_public

# =============================================================================
# Volumes
# =============================================================================
volumes:
  config_data:
  workspace_data:

# =============================================================================
# Secrets (external — pre-created on Pi)
# =============================================================================
secrets:
  gateway_token:
    external: true
    name: openclaw_gateway_token
  # anthropic_api_key:  # Disabled: Using Claude for Code token auth
  #   external: true
  #   name: openclaw_anthropic_api_key
  telegram_bot_token:
    external: true
    name: openclaw_telegram_bot_token
  notion_api_key:
    external: true
    name: openclaw_notion_api_key
  brave_api_key:
    external: true
    name: openclaw_brave_api_key

# =============================================================================
# Services
# =============================================================================
services:
  gateway:
    image: ghcr.io/openclaw/openclaw:2026.2.19
    hostname: openclaw-gateway
    expose:
      - "18789"
      - "18790"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
    secrets:
      - gateway_token
      # - anthropic_api_key  # Disabled: Using Claude for Code token auth
      - telegram_bot_token
      - notion_api_key
      - brave_api_key
    volumes:
      - config_data:/home/node/.openclaw
      - workspace_data:/home/node/.openclaw/workspace
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    networks:
      - openclaw_network
      - public_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      <<: *labels-base
      com.giocaizzi.service: "gateway"
      com.giocaizzi.component: "app"
      com.giocaizzi.tier: "core"
      com.giocaizzi.technology: "openclaw"
    <<: *security-base
    deploy:
      <<: *deploy-base
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      <<: *logging-base
